<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#F5EDDF">
<title>灵签问卜</title>
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
/*========== RESET ==========*/
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{height:100%;overflow:hidden}
body{height:100%;overflow:hidden;overscroll-behavior:none;
  background:#F5EDDF;color:#3D2E1E;
  font-family:'Noto Serif SC','STSong','SimSun','PingFang SC',serif}

/*========== PARTICLES ==========*/
#particleCanvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:200;opacity:.45}

/*========== SCREEN SYSTEM ==========*/
.screen{position:fixed;inset:0;opacity:0;visibility:hidden;
  transition:opacity .5s ease,visibility .5s ease;
  background:#F5EDDF;z-index:1}
.screen.active{opacity:1;visibility:visible;z-index:10}

/*========== NAVBAR ==========*/
.navbar{height:44px;display:flex;align-items:center;justify-content:center;
  position:relative;padding:0 16px;background:transparent}
.navbar .back{position:absolute;left:16px;top:50%;transform:translateY(-50%);
  font-size:22px;color:#8C7B6B;cursor:pointer;width:36px;height:36px;
  display:flex;align-items:center;justify-content:center;border:none;background:none}
.navbar .nav-title{font-size:17px;font-weight:500;color:#3D2E1E;letter-spacing:.05em}
.status-bar{height:env(safe-area-inset-top,44px);min-height:44px;background:transparent}

/*========== HOME SCREEN ==========*/
.home-scroll{position:absolute;top:0;left:0;right:0;bottom:0;
  overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:90px}
.home-scroll::-webkit-scrollbar{display:none}

/* Header */
.home-header{text-align:center;padding:10px 20px 0}
.home-title{font-family:'Ma Shan Zheng','Noto Serif SC',serif;
  font-size:38px;color:#3D2E1E;letter-spacing:.25em;
  margin-bottom:6px;font-weight:900}
.home-subtitle{font-size:14px;color:#8C7B6B;margin-bottom:14px;letter-spacing:.05em}
.progress-row{display:flex;align-items:center;justify-content:center;gap:8px}
.progress-label{font-size:13px;color:#8C7B6B}
.progress-dots{display:flex;gap:6px}
.progress-dot{width:8px;height:8px;border-radius:50%;background:#D9CEBD;
  transition:background .3s}
.progress-dot.filled{background:#B8956A}
.progress-count{font-size:13px;color:#8C7B6B}

/* Action Buttons Row */
.action-row{display:flex;justify-content:center;gap:10px;padding:20px 16px 0;flex-wrap:wrap}
.btn-primary{padding:10px 24px;background:#9E8C5E;color:#fff;border:none;
  border-radius:20px;font-size:15px;font-weight:500;cursor:pointer;
  font-family:'Noto Serif SC',serif;letter-spacing:.08em;
  transition:all .15s;box-shadow:0 2px 8px rgba(158,140,94,.25)}
.btn-primary:active{transform:scale(.95);box-shadow:0 1px 4px rgba(158,140,94,.3)}
.btn-outline{padding:10px 18px;background:rgba(255,255,255,.6);
  border:1px solid #D4C9B8;border-radius:20px;font-size:13px;color:#5C4E3C;
  cursor:pointer;font-family:'Noto Serif SC',serif;display:flex;align-items:center;gap:5px;
  transition:all .15s;position:relative}
.btn-outline:active{transform:scale(.95);background:rgba(255,255,255,.9)}
.btn-outline svg{width:16px;height:16px;stroke:#8C7B6B;fill:none;stroke-width:1.5}
.vip-badge{position:absolute;top:-6px;right:-6px;background:#F5A623;color:#fff;
  font-size:9px;font-weight:700;padding:2px 6px;border-radius:8px;
  font-family:'PingFang SC',sans-serif;letter-spacing:.02em}

/* Category Section */
.section-label{text-align:center;font-size:15px;color:#8C7B6B;padding:24px 0 16px;
  letter-spacing:.05em}
.category-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;padding:0 20px}
.cat-card{background:#fff;border-radius:14px;padding:20px 8px 16px;text-align:center;
  cursor:pointer;transition:all .2s;position:relative;
  border:1.5px solid transparent;
  box-shadow:0 2px 10px rgba(0,0,0,.04)}
.cat-card:active{transform:scale(.96)}
.cat-card.selected{border-color:#B8956A;background:#FBF6EE;
  box-shadow:0 2px 12px rgba(184,149,106,.15)}
.cat-card.done{background:#F0EBE2;border-color:#E0D6C6}
.cat-icon{width:36px;height:36px;margin:0 auto 8px;display:flex;align-items:center;justify-content:center}
.cat-icon svg{width:32px;height:32px;stroke:#B8956A;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.cat-name{font-size:14px;font-weight:500;color:#3D2E1E;letter-spacing:.05em}
.cat-done-char{font-family:'Ma Shan Zheng',cursive;font-size:38px;color:#C4A882;
  line-height:1.1;margin:2px 0}
.cat-done-label{font-size:11px;color:#B8A48C}
.cat-done-top{font-size:11px;color:#8C7B6B;margin-bottom:2px}

/* Stick Illustration (replaces tortoise shell) */
.stick-preview{text-align:center;padding:20px 0 10px;position:relative}
.preview-hint{font-size:14px;color:#C4B8A4;margin-bottom:18px}
.stick-illustration{width:160px;margin:0 auto;position:relative;height:220px}
.illust-body{position:absolute;bottom:0;left:50%;transform:translateX(-50%);
  width:80px;height:160px;
  background:linear-gradient(90deg,#C4A87A 0%,#D8C4A0 15%,#E8D8BC 35%,
    #F0E4CC 50%,#E8D8BC 65%,#D8C4A0 85%,#C4A87A 100%);
  border-radius:6px 6px 18px 18px;
  box-shadow:0 8px 25px rgba(0,0,0,.1),inset 0 -20px 30px rgba(0,0,0,.06);
  border:1px solid #C5B99A}
.illust-body::before{content:'';position:absolute;inset:8px 12px;
  background:repeating-linear-gradient(0deg,transparent,transparent 14px,
    rgba(0,0,0,.03) 14px,rgba(0,0,0,.03) 15px);border-radius:4px}
.illust-rim{position:absolute;bottom:132px;left:50%;transform:translateX(-50%);
  width:88px;height:12px;
  background:linear-gradient(90deg,#B8956A,#D4B888 30%,#E8D0A8 50%,#D4B888 70%,#B8956A);
  border-radius:50%;z-index:4;box-shadow:0 2px 6px rgba(0,0,0,.1)}
.illust-top{position:absolute;bottom:128px;left:50%;transform:translateX(-50%);
  width:82px;height:22px;background:#D9CEBD;border-radius:50%;z-index:3;
  border:1px solid #C5B99A;
  box-shadow:inset 0 4px 8px rgba(0,0,0,.08)}
.illust-stick{position:absolute;width:4px;border-radius:2px 2px 1px 1px;z-index:2;
  background:linear-gradient(to bottom,#C4785A 0%,#C4785A 16%,#E8D4B4 16%,#D8C4A0 100%);
  transform-origin:bottom center}
/* fade bottom */
.stick-preview::after{content:'';position:absolute;bottom:0;left:0;right:0;height:40px;
  background:linear-gradient(transparent,#F5EDDF);pointer-events:none}

/* Fixed CTA */
.fixed-cta{position:fixed;bottom:0;left:0;right:0;padding:12px 20px;
  padding-bottom:calc(12px + env(safe-area-inset-bottom,20px));
  background:linear-gradient(transparent,#F5EDDF 30%);z-index:100}
.cta-btn{width:100%;height:52px;border:none;border-radius:26px;
  font-family:'Ma Shan Zheng','Noto Serif SC',serif;font-size:18px;
  letter-spacing:.2em;cursor:pointer;transition:all .2s;
  display:flex;align-items:center;justify-content:center;gap:6px}
.cta-btn.enabled{background:#9E8C5E;color:#FFF;
  box-shadow:0 4px 15px rgba(158,140,94,.35)}
.cta-btn.enabled:active{transform:scale(.97);box-shadow:0 2px 8px rgba(158,140,94,.4)}
.cta-btn.disabled{background:#C8BEA8;color:#E8DFD0;pointer-events:none}

/*========== INCENSE SCREEN ==========*/
#screen-incense{display:flex;flex-direction:column;align-items:center;
  justify-content:center;background:#F5EDDF}
.incense-section{text-align:center;position:relative;z-index:2}
.incense-title{font-family:'Ma Shan Zheng',cursive;font-size:28px;color:#3D2E1E;
  letter-spacing:.2em;margin-bottom:6px}
.incense-sub{font-size:14px;color:#8C7B6B;margin-bottom:30px}
.incense-sticks{display:flex;gap:36px;justify-content:center;margin-bottom:20px;min-height:160px;align-items:flex-end}
.inc-stick{width:5px;height:130px;border-radius:2px;cursor:pointer;position:relative;
  background:linear-gradient(to bottom,#888 0%,#888 4%,#C4A070 4%,#A88860 100%);
  transition:all .3s}
.inc-stick .inc-tip{position:absolute;top:-5px;left:50%;transform:translateX(-50%);
  width:7px;height:7px;background:radial-gradient(circle,#FF6A00,#C41E3A);
  border-radius:50%;opacity:0;transition:opacity .5s;
  box-shadow:0 0 6px #FF6A00,0 0 12px rgba(255,106,0,.3)}
.inc-stick.lit .inc-tip{opacity:1;animation:glow 1.5s ease-in-out infinite alternate}
.inc-stick .inc-smoke{position:absolute;top:-25px;left:50%;transform:translateX(-50%);
  width:16px;height:24px;opacity:0;transition:opacity .8s;
  background:radial-gradient(ellipse,rgba(180,170,155,.3),transparent);
  animation:smokeUp 3s ease-in-out infinite;filter:blur(2px)}
.inc-stick.lit .inc-smoke{opacity:1}
@keyframes glow{0%{box-shadow:0 0 4px #FF6A00}100%{box-shadow:0 0 10px #FF6A00,0 0 18px rgba(255,150,50,.3)}}
@keyframes smokeUp{0%{transform:translateX(-50%) translateY(0) scale(1);opacity:.25}
  100%{transform:translateX(-50%) translateY(-25px) scale(1.4);opacity:0}}

.incense-hint{font-size:15px;color:#B8956A;opacity:0;transition:opacity .5s;margin-bottom:10px}
.incense-hint.show{opacity:1}
.wish-box{width:80%;max-width:280px;margin:0 auto 16px;opacity:0;transition:opacity .5s;pointer-events:none}
.wish-box.show{opacity:1;pointer-events:auto}
.wish-input{width:100%;padding:12px 16px;background:rgba(255,255,255,.5);
  border:1px solid #D4C9B8;border-radius:10px;font-size:15px;
  font-family:'Noto Serif SC',serif;color:#3D2E1E;text-align:center;outline:none}
.wish-input::placeholder{color:#C4B8A4}
.wish-input:focus{border-color:#B8956A;background:rgba(255,255,255,.8)}

.bow-section{opacity:0;transition:opacity .5s;text-align:center}
.bow-section.show{opacity:1}
.bow-btn{width:70px;height:70px;border-radius:50%;border:2px solid #B8956A;
  background:rgba(255,255,255,.4);color:#9E8C5E;
  font-family:'Ma Shan Zheng',cursive;font-size:22px;cursor:pointer;
  transition:all .15s}
.bow-btn:active{transform:scale(.88);background:rgba(184,149,106,.15)}
.bow-count{font-size:13px;color:#8C7B6B;margin-top:8px}

/*========== SHAKE SCREEN ==========*/
#screen-shake{display:flex;flex-direction:column;align-items:center;
  background:linear-gradient(180deg,#F5EDDF 0%,#EDE3D2 50%,#E8DBCA 100%)}
.shake-content{flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;width:100%;padding:0 20px}
.shake-title{font-family:'Ma Shan Zheng',cursive;font-size:26px;color:#3D2E1E;
  letter-spacing:.15em;margin-bottom:4px}
.shake-hint{font-size:14px;color:#8C7B6B;margin-bottom:20px;
  animation:breathe 2.5s ease-in-out infinite}
@keyframes breathe{0%,100%{opacity:.5}50%{opacity:1}}

.qt-wrapper{position:relative;width:180px;height:340px;z-index:2;
  transition:transform .08s ease}
.qt-body{position:absolute;bottom:0;left:50%;transform:translateX(-50%);
  width:100px;height:220px;
  background:linear-gradient(90deg,#B8956A 0%,#D4B888 12%,#E8D4B4 28%,
    #F0E4CC 42%,#F5ECD8 50%,#F0E4CC 58%,#E8D4B4 72%,#D4B888 88%,#B8956A 100%);
  border-radius:6px 6px 22px 22px;
  box-shadow:0 10px 35px rgba(0,0,0,.12),inset 0 -25px 35px rgba(0,0,0,.06);
  border:1px solid #C5B99A}
.qt-body::before{content:'';position:absolute;inset:8px 14px;
  background:repeating-linear-gradient(0deg,transparent,transparent 16px,
    rgba(0,0,0,.025) 16px,rgba(0,0,0,.025) 17px);border-radius:4px}
.qt-rim{position:absolute;top:92px;left:50%;transform:translateX(-50%);
  width:110px;height:13px;
  background:linear-gradient(90deg,#A07D50,#C9A76C 25%,#E0C890 50%,#C9A76C 75%,#A07D50);
  border-radius:50%;z-index:4;box-shadow:0 2px 6px rgba(0,0,0,.1)}
.qt-top{position:absolute;top:88px;left:50%;transform:translateX(-50%);
  width:104px;height:28px;background:#E8DCC8;border-radius:50%;z-index:3;
  border:1px solid #C5B99A;box-shadow:inset 0 5px 12px rgba(0,0,0,.06)}
.qt-sticks{position:absolute;top:30px;left:50%;transform:translateX(-50%);
  width:74px;height:80px;z-index:2}
.qt-stick{position:absolute;width:4.5px;bottom:0;border-radius:2px 2px 1px 1px;
  background:linear-gradient(to bottom,#C4785A 0%,#C4785A 16%,#EAD8B8 16%,#D8C4A0 100%);
  transform-origin:bottom center;transition:transform .06s ease}

.fallen-s{position:absolute;bottom:20px;left:50%;width:5px;height:150px;
  border-radius:2px;z-index:5;opacity:0;
  background:linear-gradient(to bottom,#C4785A 0%,#C4785A 16%,#EAD8B8 16%,#D8C4A0 100%);
  transform:translateX(-50%)}
.fallen-s.fall{animation:sFall 1s cubic-bezier(.22,.68,.36,1.15) forwards}
@keyframes sFall{
  0%{opacity:1;transform:translateX(-50%) translateY(-100px) rotate(0)}
  35%{opacity:1;transform:translateX(-50%) translateY(-140px) rotate(-12deg)}
  70%{transform:translateX(30px) translateY(70px) rotate(-78deg)}
  85%{transform:translateX(34px) translateY(62px) rotate(-83deg)}
  100%{opacity:1;transform:translateX(30px) translateY(66px) rotate(-80deg)}}

.s-number{position:absolute;bottom:55px;right:10px;
  font-family:'Ma Shan Zheng',cursive;font-size:20px;color:#B8956A;
  opacity:0;z-index:6;transition:opacity .5s .8s}
.s-number.show{opacity:1}

.shake-bar-wrap{width:50%;max-width:180px;height:4px;background:rgba(184,149,106,.15);
  border-radius:2px;margin-top:16px;overflow:hidden}
.shake-bar{height:100%;width:0;background:linear-gradient(90deg,#B8956A,#D4A84C);
  border-radius:2px;transition:width .12s ease}

.shake-status{font-size:13px;color:#8C7B6B;margin-top:10px}

/*========== RESULT SCREEN ==========*/
#screen-result{display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:20px;
  background:linear-gradient(180deg,#F5EDDF,#EDE3D2)}
.result-card{width:92%;max-width:360px;padding:30px 24px;position:relative;
  background:linear-gradient(145deg,#FFFAF0,#F8F0E0,#FFF8EC);
  border-radius:16px;transform:scale(0);transition:transform .5s cubic-bezier(.34,1.56,.64,1);
  box-shadow:0 8px 40px rgba(0,0,0,.08),0 1px 3px rgba(0,0,0,.04);
  max-height:82vh;overflow-y:auto;border:1px solid #E8DCC8}
.result-card.show{transform:scale(1)}
.result-card::-webkit-scrollbar{display:none}
/* inner border */
.result-card::after{content:'';position:absolute;inset:10px;
  border:1px solid rgba(184,149,106,.2);border-radius:10px;pointer-events:none}

.res-header{text-align:center;padding-bottom:16px;border-bottom:1px solid #E8DCC8;margin-bottom:16px}
.res-num{font-size:15px;color:#8C7B6B;margin-bottom:8px;letter-spacing:.08em}
.res-level{display:inline-block;padding:5px 20px;border:2px solid #B8956A;color:#B8956A;
  font-family:'Ma Shan Zheng',cursive;font-size:22px;letter-spacing:.15em;
  transform:rotate(-2deg);border-radius:4px;position:relative}

.res-poem{text-align:center;margin:20px 0;line-height:2.4;
  font-family:'Ma Shan Zheng',cursive;font-size:18px;color:#3D2E1E;letter-spacing:.08em}
.poem-ln{display:block}

.res-divider{display:flex;align-items:center;gap:10px;margin:16px 0;color:#B8956A}
.res-divider::before,.res-divider::after{content:'';flex:1;height:1px;
  background:linear-gradient(90deg,transparent,#D4C9B8,transparent)}
.res-divider span{font-size:12px;white-space:nowrap;letter-spacing:.1em}

.res-interp{font-size:15px;line-height:1.9;color:#5C4E3C;text-indent:2em;
  text-align:justify;margin-bottom:14px}

.res-details{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:6px}
.det-item{padding:10px;background:rgba(184,149,106,.06);border-radius:8px;
  border-left:3px solid #B8956A}
.det-label{font-size:11px;color:#8C7B6B;margin-bottom:3px}
.det-val{font-size:14px;color:#3D2E1E;font-family:'Ma Shan Zheng',cursive}

.res-actions{display:flex;gap:12px;margin-top:22px;justify-content:center}
.btn-again{padding:12px 32px;background:#9E8C5E;color:#fff;border:none;
  border-radius:22px;font-family:'Ma Shan Zheng',cursive;font-size:17px;
  letter-spacing:.15em;cursor:pointer;transition:all .15s;
  box-shadow:0 3px 10px rgba(158,140,94,.25)}
.btn-again:active{transform:scale(.95)}
.btn-home{padding:12px 24px;background:transparent;border:1px solid #D4C9B8;
  color:#5C4E3C;border-radius:22px;font-family:'Ma Shan Zheng',cursive;
  font-size:17px;letter-spacing:.1em;cursor:pointer;transition:all .15s}
.btn-home:active{transform:scale(.95)}

/*========== FADE ==========*/
.fade-up{animation:fadeUp .6s ease forwards}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<canvas id="particleCanvas"></canvas>

<!-- ============ HOME ============ -->
<section id="screen-home" class="screen active">
  <div class="home-scroll" id="homeScroll">
    <div class="status-bar"></div>
    <div class="navbar">
      <span class="nav-title">问天机</span>
    </div>

    <div class="home-header">
      <h1 class="home-title">灵签 问卜</h1>
      <p class="home-subtitle" id="dateDisplay"></p>
      <div class="progress-row">
        <span class="progress-label">今日进度</span>
        <div class="progress-dots" id="progDots">
          <i class="progress-dot"></i><i class="progress-dot"></i>
          <i class="progress-dot"></i><i class="progress-dot"></i>
          <i class="progress-dot"></i>
        </div>
        <span class="progress-count" id="progCount">0/5</span>
      </div>
    </div>

    <div class="action-row">
      <button class="btn-primary" id="btnDaily">今日一签</button>
      <button class="btn-outline">
        <svg viewBox="0 0 24 24"><path d="M12 8V12L15 15"/><circle cx="12" cy="12" r="9"/></svg>
        签文仓库
      </button>
      <button class="btn-outline">
        <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
        签文日历
        <span class="vip-badge">VIP</span>
      </button>
    </div>

    <p class="section-label">请先选所问之事：</p>
    <div class="category-grid" id="catGrid">
      <!-- 卜健康 -->
      <div class="cat-card" data-cat="health">
        <div class="cat-icon"><svg viewBox="0 0 36 36"><path d="M4 18h6l3-8 4 16 3-8h12"/></svg></div>
        <div class="cat-name">卜健康</div>
      </div>
      <!-- 卜事业 -->
      <div class="cat-card" data-cat="career">
        <div class="cat-icon"><svg viewBox="0 0 36 36"><path d="M18 4v28M10 12h16M6 20h24"/><circle cx="18" cy="8" r="2"/></svg></div>
        <div class="cat-name">卜事业</div>
      </div>
      <!-- 卜关系 -->
      <div class="cat-card" data-cat="relation">
        <div class="cat-icon"><svg viewBox="0 0 36 36"><path d="M18 30S4 20 4 13a8 8 0 0114-5 8 8 0 0114 5c0 7-14 17-14 17z"/></svg></div>
        <div class="cat-name">卜关系</div>
      </div>
      <!-- 卜财运 -->
      <div class="cat-card" data-cat="wealth">
        <div class="cat-icon"><svg viewBox="0 0 36 36"><circle cx="18" cy="18" r="10"/><rect x="15" y="15" width="6" height="6" rx="3"/><path d="M18 8v4M18 24v4"/></svg></div>
        <div class="cat-name">卜财运</div>
      </div>
      <!-- 卜一事 -->
      <div class="cat-card" data-cat="single">
        <div class="cat-icon"><svg viewBox="0 0 36 36"><circle cx="18" cy="12" r="5"/><path d="M18 17v8"/><path d="M14 32a4 4 0 018 0"/></svg></div>
        <div class="cat-name">卜一事</div>
      </div>
      <!-- 年度主签 -->
      <div class="cat-card" data-cat="yearly">
        <div class="cat-icon"><svg viewBox="0 0 36 36"><path d="M18 4l4 8h8l-6 5 2 9-8-5-8 5 2-9-6-5h8z"/></svg></div>
        <div class="cat-name">年度主签</div>
      </div>
    </div>

    <div class="stick-preview" id="stickPreview">
      <p class="preview-hint" id="previewHint">请先选择上方所问之事</p>
      <div class="stick-illustration" id="stickIllust">
        <div class="illust-rim"></div>
        <div class="illust-top"></div>
        <div class="illust-body"></div>
      </div>
    </div>

    <div style="height:30px"></div>
  </div>

  <div class="fixed-cta">
    <button class="cta-btn disabled" id="ctaBtn">
      摇 签 问 卜
    </button>
  </div>
</section>

// ---------- SOUND (Web Audio) ----------
const Snd={
  ctx:null,
  init(){if(this.ctx)return;try{this.ctx=new(window.AudioContext||window.webkitAudioContext)}catch(e){}},
  _o(f,tp,dur,v=.25){if(!this.ctx)return;const o=this.ctx.createOscillator(),g=this.ctx.createGain();
    o.connect(g);g.connect(this.ctx.destination);o.frequency.value=f;o.type=tp;
    g.gain.setValueAtTime(v,this.ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,this.ctx.currentTime+dur);
    o.start(this.ctx.currentTime);o.stop(this.ctx.currentTime+dur)},
  knock(){this._o(160,'sine',.1,.4);this._o(90,'sine',.07,.3)},
  bamboo(){if(!this.ctx)return;const r=this.ctx.sampleRate,l=r*.05,b=this.ctx.createBuffer(1,l,r),
    d=b.getChannelData(0);for(let i=0;i<l;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/l*6);
    const s=this.ctx.createBufferSource();s.buffer=b;
    const f=this.ctx.createBiquadFilter();f.type='bandpass';f.frequency.value=4200;f.Q.value=.7;
    const g=this.ctx.createGain();g.gain.value=.2;
    s.connect(f);f.connect(g);g.connect(this.ctx.destination);s.start()},
  drop(){this._o(200,'sine',.14,.35);setTimeout(()=>this._o(130,'sine',.1,.25),90)},
  bell(){this._o(880,'sine',2,.15);this._o(1320,'sine',1.5,.06);this._o(660,'sine',1.6,.08)},
  match(){if(!this.ctx)return;const r=this.ctx.sampleRate,l=r*.25,b=this.ctx.createBuffer(1,l,r),
    d=b.getChannelData(0);for(let i=0;i<l;i++)d[i]=(Math.random()*2-1)*.12*Math.exp(-i/l*4);
    const s=this.ctx.createBufferSource();s.buffer=b;
    const g=this.ctx.createGain();g.gain.value=.15;
    s.connect(g);g.connect(this.ctx.destination);s.start()}
};

function vib(p){if(navigator.vibrate)navigator.vibrate(p)}

// ---------- PARTICLES ----------
const P={
  cvs:null,cx:null,pts:[],ems:[],
  init(){this.cvs=document.getElementById('particleCanvas');
    this.cx=this.cvs.getContext('2d');this.resize();
    window.addEventListener('resize',()=>this.resize());this.loop()},
  resize(){this.cvs.width=innerWidth;this.cvs.height=innerHeight},
  setE(e){this.ems=e},
  spawn(x,y){if(this.pts.length>40)return;
    this.pts.push({x,y,vx:(Math.random()-.5)*.5,vy:-Math.random()*.9-.2,
      a:Math.random()*.18+.05,r:Math.random()*3+1.5,life:Math.random()*100+50,age:0})},
  loop(){const{cx,cvs}=this;cx.clearRect(0,0,cvs.width,cvs.height);
    this.ems.forEach(e=>{if(Math.random()<(e.rate||.25))
      this.spawn(e.x+(Math.random()-.5)*(e.spread||8),e.y)});
    for(let i=this.pts.length-1;i>=0;i--){const p=this.pts[i];
      p.x+=p.vx+Math.sin(p.age*.03)*.35;p.y+=p.vy;p.age++;p.a*=.992;p.r+=.025;
      if(p.age>=p.life||p.a<.004){this.pts.splice(i,1);continue}
      cx.beginPath();cx.arc(p.x,p.y,p.r,0,Math.PI*2);
      cx.fillStyle=`rgba(170,160,145,${p.a})`;cx.fill()}
    requestAnimationFrame(()=>this.loop())}
};

    ['午','11'],['未','13'],['申','15'],['酉','17'],['戌','19'],['亥','21']];
  let tc=tz[0];for(const t of tz)if(hrs>=+t[1])tc=t;if(hrs<1)tc=tz[0];

    `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日 星期${wk[d.getDay()]} · ${tc[0]}时`;

function go(from,to,delay=0){

    if(to==='shake')initShake();

function updateEmit(){
  const w=innerWidth,h=innerHeight;
  switch(S.screen){
    case'incense':{
      const es=[];document.querySelectorAll('.inc-stick.lit').forEach(s=>{
        const r=s.getBoundingClientRect();es.push({x:r.left+r.width/2,y:r.top-4,rate:.18,spread:3})});
      P.setE(es);break}
    case'shake':P.setE([{x:w/2,y:h*.3,rate:.08,spread:16}]);break;
    default:P.setE([]);
  }
}

// Touch shake
let lastTY=0;
function initTouchShake(){
  const w=document.getElementById('qtWrap');
  w.addEventListener('touchstart',e=>{lastTY=e.touches[0].clientY},{passive:true});
  w.addEventListener('touchmove',e=>{
    const y=e.touches[0].clientY;if(Math.abs(y-lastTY)>10){shakeInput();lastTY=y}
  },{passive:true});
}

// Device motion
async function reqMotion(){
  if(typeof DeviceMotionEvent==='undefined')return;
  if(typeof DeviceMotionEvent.requestPermission==='function'){
    try{const p=await DeviceMotionEvent.requestPermission();if(p==='granted')bindMotion()}catch(e){}
  }else bindMotion();
}
function bindMotion(){
  if(S.motionOK)return;S.motionOK=true;
  let la={x:0,y:0,z:0};
  window.addEventListener('devicemotion',e=>{
    if(S.screen!=='shake'||S.stickOut)return;
    const a=e.accelerationIncludingGravity;if(!a)return;
    const d=Math.abs(a.x-la.x)+Math.abs(a.y-la.y)+Math.abs(a.z-la.z);
    if(d>22)shakeInput();la={x:a.x,y:a.y,z:a.z};
  });
}

// ---------- RESULT ----------
function showResult(){
  const f=S.fortune;if(!f)return;
  document.getElementById('resNum').textContent=
    `灵签 · 第${f.n}签 · 问${CAT_NAMES[S.cat]||''}`;
  document.getElementById('resLevel').textContent=f.l;
  document.getElementById('resPoem').innerHTML=
    f.p.split('\n').map(l=>`<span class="poem-ln">${l}</span>`).join('');
  document.getElementById('resInterp').textContent=f.t;
  const dd=document.getElementById('resDet');dd.innerHTML='';
  for(const[k,v]of Object.entries(f.d)){
    dd.innerHTML+=`<div class="det-item"><div class="det-label">${k}</div><div class="det-val">${v}</div></div>`;
  }
  setTimeout(()=>document.getElementById('resCard').classList.add('show'),80);
}

// ---------- RESET ----------
function resetToIncense(){
  document.getElementById('resCard').classList.remove('show');
  initIncense();
  setTimeout(()=>go('result','incense'),250);
}
function resetToHome(){
  if(S.cat)markDone(S.cat);
  document.getElementById('resCard').classList.remove('show');
  S.cat=null;
  document.getElementById('ctaBtn').classList.add('disabled');
  document.getElementById('ctaBtn').classList.remove('enabled');
  document.getElementById('previewHint').textContent='请先选择上方所问之事';
  setTimeout(()=>go('result','home'),250);
}

// ---------- INIT ----------
function init(){
  setDate();makeIllustSticks();P.init();initCats();initBow();initTouchShake();

  // CTA
  document.getElementById('ctaBtn').addEventListener('click',()=>{
    if(!S.cat)return;Snd.init();Snd.bell();vib(20);initIncense();go('home','incense',150);
  });

  // Daily quick
  document.getElementById('btnDaily').addEventListener('click',()=>{
    Snd.init();S.cat='daily';initIncense();go('home','incense',150);
  });

  // Back buttons
  document.getElementById('backFromIncense').addEventListener('click',()=>go('incense','home'));
  document.getElementById('backFromShake').addEventListener('click',()=>{
    if(S.stickOut)return;go('shake','home');
  });

  // Result buttons
  document.getElementById('btnReshake').addEventListener('click',resetToIncense);
  document.getElementById('btnGoHome').addEventListener('click',resetToHome);

  // Prevent scroll on non-home screens
  document.addEventListener('touchmove',e=>{
    if(S.screen!=='home'&&S.screen!=='result')e.preventDefault();
  },{passive:false});
}
document.addEventListener('DOMContentLoaded',init);
</script>
