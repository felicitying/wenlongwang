<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>小龙王灵签</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Noto Serif SC', 'STKaiti', 'KaiTi', 'SimSun', serif;
      user-select: none;
      -webkit-user-select: none
    }

    /* ========== 背景 ========== */
    .bg {
      position: fixed;
      inset: 0;
      z-index: 0
    }

    .bg-img {
      position: absolute;
      inset: 0;
      background: url('bg.jpg') center center/cover no-repeat
    }

    .bg-top {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 28%;
      background: linear-gradient(180deg, rgba(8, 2, 18, .72) 0%, rgba(8, 2, 18, .2) 55%, transparent 100%);
      z-index: 1
    }

    .bg-bot {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 42%;
      background: linear-gradient(0deg, rgba(5, 0, 8, .88) 0%, rgba(5, 0, 8, .4) 40%, transparent 100%);
      z-index: 1
    }

    .bg-glow {
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      background: radial-gradient(ellipse at 55% 35%, rgba(255, 210, 80, .06) 0%, transparent 55%);
      animation: bgG 5s ease-in-out infinite alternate
    }

    @keyframes bgG {
      0% {
        opacity: .4
      }

      100% {
        opacity: 1
      }
    }

    .gold-box {
      position: absolute;
      inset: 0;
      z-index: 3;
      pointer-events: none;
      overflow: hidden
    }

    .gp {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 215, 0, .85), rgba(255, 180, 0, .2));
      animation: gpUp linear infinite
    }

    @keyframes gpUp {
      0% {
        transform: translateY(100vh) scale(0);
        opacity: 0
      }

      12% {
        opacity: .7
      }

      88% {
        opacity: .7
      }

      100% {
        transform: translateY(-12vh) scale(1);
        opacity: 0
      }
    }

    /* ========== 标题 ========== */
    .header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 20;
      padding: clamp(14px, 3.5vw, 22px) 0 10px;
      text-align: center
    }

    .h1 {
      font-size: clamp(22px, 6.5vw, 30px);
      color: #ffd700;
      letter-spacing: 6px;
      font-weight: bold;
      text-shadow: 0 0 14px rgba(255, 215, 0, .5), 0 2px 6px rgba(0, 0, 0, .8)
    }

    .h2 {
      font-size: clamp(10px, 2.8vw, 13px);
      color: rgba(255, 255, 255, .62);
      margin-top: 3px;
      letter-spacing: 2px;
      text-shadow: 0 1px 4px rgba(0, 0, 0, .6)
    }

    /* ========== 音效 ========== */
    .snd {
      position: fixed;
      top: 16px;
      right: 12px;
      z-index: 25;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(0, 0, 0, .3);
      border: 1px solid rgba(255, 255, 255, .18);
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(6px)
    }

    .snd:active {
      transform: scale(.88)
    }

    /* ========== 气泡 ========== */
    .bub {
      position: fixed;
      z-index: 18;
      left: 50%;
      top: clamp(62px, 16%, 95px);
      transform: translateX(-50%) translateY(8px);
      padding: 9px 18px;
      background: rgba(255, 255, 255, .93);
      border-radius: 18px;
      color: #3a2a1a;
      font-size: 13px;
      text-align: center;
      line-height: 1.5;
      box-shadow: 0 4px 20px rgba(0, 0, 0, .22);
      max-width: 82vw;
      white-space: nowrap;
      opacity: 0;
      transition: all .5s ease;
      pointer-events: none
    }

    .bub::after {
      content: '';
      position: absolute;
      bottom: -7px;
      left: 50%;
      transform: translateX(-50%);
      border: 7px solid transparent;
      border-top-color: rgba(255, 255, 255, .93)
    }

    .bub.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0)
    }

    /* ========== 签筒热区 ========== */
    .hotspot {
      position: fixed;
      z-index: 12;
      cursor: pointer;
      width: 55vw;
      max-width: 280px;
      height: 45vw;
      max-height: 300px;
      min-width: 180px;
      min-height: 160px;
      left: 50%;
      bottom: 22%;
      transform: translateX(-50%);
      border-radius: 20px
    }

    .hs-glow {
      position: absolute;
      inset: -15%;
      border-radius: 50%;
      pointer-events: none;
      background: radial-gradient(ellipse, rgba(255, 215, 0, .18) 0%, transparent 65%);
      animation: hsG 2s ease-in-out infinite alternate
    }

    @keyframes hsG {
      0% {
        transform: scale(.85);
        opacity: .25
      }

      100% {
        transform: scale(1.2);
        opacity: .9
      }
    }

    .hs-txt {
      position: absolute;
      bottom: -8px;
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
      color: rgba(255, 215, 0, .75);
      font-size: 12px;
      letter-spacing: 2px;
      text-shadow: 0 0 10px rgba(255, 215, 0, .35), 0 1px 3px rgba(0, 0, 0, .5);
      animation: htB 2s ease-in-out infinite;
      pointer-events: none;
      background: rgba(0, 0, 0, .35);
      padding: 4px 14px;
      border-radius: 12px;
      backdrop-filter: blur(3px)
    }

    @keyframes htB {

      0%,
      100% {
        opacity: .4
      }

      50% {
        opacity: 1
      }
    }

    .hs-rip {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 80%;
      height: 80%;
      transform: translate(-50%, -50%) scale(0);
      border: 2.5px solid rgba(255, 215, 0, .55);
      border-radius: 50%;
      opacity: 0;
      pointer-events: none
    }

    .hs-rip.go {
      animation: ripG .8s ease-out forwards
    }

    .hs-rip2 {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 60%;
      height: 60%;
      transform: translate(-50%, -50%) scale(0);
      border: 2px solid rgba(255, 255, 255, .3);
      border-radius: 50%;
      opacity: 0;
      pointer-events: none
    }

    .hs-rip2.go {
      animation: ripG .9s .1s ease-out forwards
    }

    @keyframes ripG {
      0% {
        transform: translate(-50%, -50%) scale(.3);
        opacity: 1
      }

      100% {
        transform: translate(-50%, -50%) scale(2);
        opacity: 0
      }
    }

    /* ========== 摇签遮罩 ========== */
    .shake-ov {
      position: fixed;
      inset: 0;
      z-index: 60;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0);
      visibility: hidden;
      transition: background .4s, backdrop-filter .4s;
      backdrop-filter: blur(0)
    }

    .shake-ov.show {
      visibility: visible;
      background: rgba(0, 0, 0, .6);
      backdrop-filter: blur(8px)
    }

    .qt-stage {
      position: relative;
      width: clamp(150px, 42vw, 220px);
      transform: scale(0) rotate(-15deg);
      opacity: 0;
      transition: all .5s cubic-bezier(.34, 1.56, .64, 1);
      perspective: 600px
    }

    .shake-ov.show .qt-stage {
      transform: scale(1) rotate(0);
      opacity: 1
    }

    .qt-pic {
      width: 100%;
      display: block;
      position: relative;
      z-index: 2;
      filter: drop-shadow(0 12px 35px rgba(0, 0, 0, .65))
    }

    .sk-box {
      position: absolute;
      top: -5%;
      left: 50%;
      transform: translateX(-50%);
      width: 55%;
      height: 50%;
      z-index: 1;
      pointer-events: none
    }

    .sk-item {
      position: absolute;
      bottom: 0;
      transform-origin: bottom center
    }

    .sk-item img {
      height: clamp(70px, 20vw, 110px);
      width: auto;
      mix-blend-mode: multiply;
      filter: drop-shadow(0 2px 5px rgba(0, 0, 0, .3))
    }

    .sk-item:nth-child(1) {
      left: 5%;
      transform: rotate(-15deg)
    }

    .sk-item:nth-child(2) {
      left: 20%;
      transform: rotate(-7deg)
    }

    .sk-item:nth-child(3) {
      left: 37%;
      transform: rotate(2deg)
    }

    .sk-item:nth-child(4) {
      left: 54%;
      transform: rotate(10deg)
    }

    .sk-item:nth-child(5) {
      left: 70%;
      transform: rotate(17deg)
    }

    .qt-base-glow {
      position: absolute;
      bottom: -15%;
      left: 50%;
      transform: translateX(-50%);
      width: 150%;
      height: 30%;
      border-radius: 50%;
      background: radial-gradient(ellipse, rgba(255, 215, 0, .2) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0
    }

    .qt-label {
      text-align: center;
      margin-top: 18px;
      color: rgba(255, 215, 0, .75);
      font-size: 15px;
      letter-spacing: 3px;
      text-shadow: 0 0 12px rgba(255, 215, 0, .35);
      opacity: 0;
      transition: opacity .5s .3s
    }

    .shake-ov.show .qt-label {
      opacity: 1
    }

    .qt-stage.shaking .qt-pic {
      animation: qtS .32s ease-in-out 8;
      transform-style: preserve-3d
    }

    @keyframes qtS {

      0%,
      100% {
        transform: rotateZ(0) rotateY(0) translateY(0)
      }

      12% {
        transform: rotateZ(-10deg) rotateY(-6deg) translateY(-6px)
      }

      28% {
        transform: rotateZ(12deg) rotateY(7deg) translateY(-3px)
      }

      42% {
        transform: rotateZ(-11deg) rotateY(-5deg) translateY(-7px)
      }

      56% {
        transform: rotateZ(9deg) rotateY(6deg) translateY(-2px)
      }

      72% {
        transform: rotateZ(-7deg) rotateY(-4deg) translateY(-5px)
      }

      86% {
        transform: rotateZ(5deg) rotateY(3deg) translateY(-1px)
      }
    }

    .qt-stage.shaking .sk-item {
      animation: skB .16s ease-in-out 16 alternate
    }

    .qt-stage.shaking .sk-item:nth-child(odd) {
      animation-delay: .03s
    }

    .qt-stage.shaking .sk-item:nth-child(even) {
      animation-delay: .08s
    }

    @keyframes skB {
      0% {
        transform: rotate(var(--r, 0)) translateY(0)
      }

      100% {
        transform: rotate(var(--r, 0)) translateY(-10px)
      }
    }

    .qt-stage.shaking {
      animation: stV .1s ease-in-out 25
    }

    @keyframes stV {

      0%,
      100% {
        transform: scale(1) rotate(0)
      }

      25% {
        transform: scale(1) rotate(-4deg)
      }

      75% {
        transform: scale(1) rotate(4deg)
      }
    }

    /* ========== 飞签 ========== */
    .fly-stick {
      position: fixed;
      z-index: 65;
      pointer-events: none;
      opacity: 0;
      left: 50%;
      top: 38%
    }

    .fly-stick img {
      height: clamp(100px, 28vw, 150px);
      width: auto;
      mix-blend-mode: multiply;
      filter: drop-shadow(0 6px 18px rgba(0, 0, 0, .55))
    }

    .fly-stick.go {
      animation: stkF 1.4s cubic-bezier(.2, .85, .3, 1) forwards
    }

    @keyframes stkF {
      0% {
        opacity: 1;
        transform: translate(-50%, -20px) rotate(0)
      }

      12% {
        opacity: 1;
        transform: translate(-25px, -80px) rotate(-12deg)
      }

      30% {
        opacity: 1;
        transform: translate(15px, -130px) rotate(18deg)
      }

      50% {
        opacity: 1;
        transform: translate(35px, -70px) rotate(45deg)
      }

      70% {
        opacity: 1;
        transform: translate(50px, 10px) rotate(65deg)
      }

      100% {
        opacity: 0;
        transform: translate(60px, 140px) rotate(90deg)
      }
    }

    /* ========== 底部操作栏 ========== */
    .action-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      z-index: 20;
      padding: 0 12px clamp(16px, 4vw, 26px);
      text-align: center
    }

    .cat-row {
      display: flex;
      justify-content: center;
      gap: 5px;
      margin-bottom: 10px;
      flex-wrap: wrap
    }

    .cat-btn {
      padding: 5px 11px;
      background: rgba(0, 0, 0, .32);
      border: 1px solid rgba(255, 255, 255, .1);
      border-radius: 18px;
      color: rgba(255, 255, 255, .55);
      font-size: 11px;
      letter-spacing: 1px;
      cursor: pointer;
      font-family: inherit;
      backdrop-filter: blur(4px);
      transition: all .2s
    }

    .cat-btn:active {
      transform: scale(.93)
    }

    .cat-btn.on {
      background: rgba(255, 215, 0, .12);
      border-color: rgba(255, 215, 0, .35);
      color: #ffd700
    }

    .main-btn {
      display: inline-block;
      padding: 12px 38px;
      margin-bottom: 8px;
      background: linear-gradient(135deg, rgba(160, 110, 20, .4), rgba(255, 215, 0, .12));
      border: 1.5px solid rgba(255, 215, 0, .5);
      border-radius: 35px;
      color: #ffd700;
      font-size: clamp(15px, 4.2vw, 18px);
      letter-spacing: 5px;
      font-family: inherit;
      cursor: pointer;
      transition: all .3s;
      box-shadow: 0 0 20px rgba(255, 215, 0, .12), 0 4px 12px rgba(0, 0, 0, .3);
      backdrop-filter: blur(6px);
      animation: bP 2.5s ease-in-out infinite
    }

    .main-btn:active {
      transform: scale(.94);
      background: rgba(255, 215, 0, .28)
    }

    @keyframes bP {

      0%,
      100% {
        box-shadow: 0 0 18px rgba(255, 215, 0, .1), 0 4px 12px rgba(0, 0, 0, .3)
      }

      50% {
        box-shadow: 0 0 35px rgba(255, 215, 0, .3), 0 4px 12px rgba(0, 0, 0, .3)
      }
    }

    .cnt {
      font-size: 10px;
      color: rgba(255, 255, 255, .28);
      letter-spacing: 1px
    }

    /* ========== 粒子 ========== */
    .pt-box {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 66
    }

    .pt {
      position: absolute;
      border-radius: 50%;
      opacity: 0
    }

    .pt.go {
      animation: ptF 1.3s ease-out forwards
    }

    @keyframes ptF {
      0% {
        opacity: 1;
        transform: translate(0, 0) scale(1)
      }

      100% {
        opacity: 0;
        transform: translate(var(--tx), var(--ty)) scale(0)
      }
    }

    .cf-box {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 67;
      overflow: hidden
    }

    .cf {
      position: absolute;
      opacity: 0
    }

    .cf.go {
      animation: cfD 3s ease-in forwards
    }

    @keyframes cfD {
      0% {
        opacity: 1;
        transform: translateY(-15px) rotate(0)
      }

      100% {
        opacity: 0;
        transform: translateY(105vh) rotate(800deg)
      }
    }

    /* ======================================================================
   ★★★ 全新签文弹窗 —— 简约大气高级配色 ★★★
   ====================================================================== */
    .overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0);
      visibility: hidden;
      transition: all .5s;
      backdrop-filter: blur(0)
    }

    .overlay.show {
      visibility: visible;
      background: rgba(8, 5, 15, .82);
      backdrop-filter: blur(18px)
    }

    .slip {
      width: 88%;
      max-width: 380px;
      max-height: 92vh;
      overflow-y: auto;
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
      position: relative;
      border-radius: 20px;
      transform: translateY(40px) scale(.92);
      opacity: 0;
      transition: all .6s cubic-bezier(.16, 1, .3, 1)
    }

    .overlay.show .slip {
      transform: translateY(0) scale(1);
      opacity: 1
    }

    /* 卡片背景 —— 深色磨砂玻璃 */
    .slip-bg {
      position: absolute;
      inset: 0;
      border-radius: 20px;
      overflow: hidden;
      background: linear-gradient(165deg,
          rgba(28, 22, 38, .97) 0%,
          rgba(22, 18, 32, .98) 40%,
          rgba(18, 14, 28, .99) 100%);
      box-shadow:
        0 25px 60px rgba(0, 0, 0, .5),
        0 0 0 1px rgba(255, 215, 0, .08),
        inset 0 1px 0 rgba(255, 255, 255, .05);
      backdrop-filter: blur(40px)
    }

    /* 顶部金色渐变条 */
    .slip-bg::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, #c9a84c 20%, #ffd700 50%, #c9a84c 80%, transparent);
      opacity: .7
    }

    /* 底部微光 */
    .slip-bg::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 10%;
      right: 10%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255, 215, 0, .15), transparent)
    }

    /* 内容 */
    .slip-body {
      position: relative;
      z-index: 3;
      padding: clamp(28px, 7vw, 40px) clamp(20px, 5vw, 32px) clamp(24px, 6vw, 32px)
    }

    /* 类别徽章 */
    .s-badge {
      text-align: center;
      margin-bottom: 16px
    }

    .s-badge span {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 16px;
      border-radius: 20px;
      font-size: 11px;
      letter-spacing: 2px;
      background: linear-gradient(135deg, rgba(201, 168, 76, .12), rgba(201, 168, 76, .04));
      border: 1px solid rgba(201, 168, 76, .2);
      color: rgba(201, 168, 76, .8)
    }

    /* 签号 */
    .s-no {
      text-align: center;
      font-size: 13px;
      color: rgba(255, 255, 255, .35);
      letter-spacing: 6px;
      margin-bottom: 6px;
      font-weight: 300
    }

    /* 签等级 */
    .s-lv {
      text-align: center;
      margin-bottom: 20px
    }

    .s-lv-text {
      display: inline-block;
      font-size: clamp(32px, 9vw, 42px);
      font-weight: bold;
      letter-spacing: 12px;
      background: linear-gradient(180deg, #fff8e1 0%, #ffd700 40%, #c9a84c 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 2px 8px rgba(255, 215, 0, .3))
    }

    .s-lv.mid .s-lv-text {
      background: linear-gradient(180deg, #e8dcc8 0%, #c9a84c 40%, #8b7335 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 2px 6px rgba(201, 168, 76, .2))
    }

    .s-lv.bad .s-lv-text {
      background: linear-gradient(180deg, #c8b8a0 0%, #8b7335 40%, #6b5a2e 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 2px 4px rgba(139, 115, 53, .15))
    }

    /* 分割线 */
    .s-line {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 0 auto 22px;
      width: 80%
    }

    .s-line::before,
    .s-line::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(201, 168, 76, .2), transparent)
    }

    .s-line i {
      font-style: normal;
      color: rgba(201, 168, 76, .35);
      font-size: 8px
    }

    /* 签诗 */
    .s-poem {
      text-align: center;
      margin-bottom: 22px
    }

    .s-poem p {
      margin: 0;
      color: rgba(255, 252, 240, .85);
      font-size: clamp(16px, 4.5vw, 19px);
      line-height: 2.4;
      letter-spacing: 4px;
      font-weight: 400;
      opacity: 0;
      animation: pmI .6s ease forwards
    }

    .s-poem p:nth-child(1) {
      animation-delay: .15s
    }

    .s-poem p:nth-child(2) {
      animation-delay: .4s
    }

    .s-poem p:nth-child(3) {
      animation-delay: .65s
    }

    .s-poem p:nth-child(4) {
      animation-delay: .9s
    }

    @keyframes pmI {
      to {
        opacity: 1
      }
    }

    /* 解签区 */
    .s-explain-box {
      position: relative;
      margin: 0 auto 20px;
      padding: 16px 18px;
      background: linear-gradient(135deg, rgba(201, 168, 76, .06), rgba(201, 168, 76, .02));
      border-radius: 12px;
      border: 1px solid rgba(201, 168, 76, .1)
    }

    .s-explain-box::before {
      content: '📜';
      position: absolute;
      top: -10px;
      left: 16px;
      font-size: 16px;
      background: rgba(28, 22, 38, .97);
      padding: 0 6px
    }

    .s-exp {
      color: rgba(255, 252, 240, .6);
      font-size: 13px;
      line-height: 2;
      letter-spacing: .5px;
      opacity: 0;
      animation: exI .8s 1.2s ease forwards
    }

    @keyframes exI {
      to {
        opacity: 1
      }
    }

    /* 印章 */
    .s-seal {
      position: absolute;
      top: 12px;

        { n: "健康第一签", lv: "上上签", lc: "good", pm: ["百病消散如云烟", "身轻体健赛神仙", "龙王庇佑保平安", "健康长寿福无边"], ex: "大吉！健康运势极佳。身体状态非常好，精力充沛。之前困扰的健康小问题也会逐渐好转消失。" },
        { n: "健康第二签", lv: "上签", lc: "good", pm: ["龙体安康万事兴", "起居有常百病轻", "心宽体胖乐逍遥", "长命百岁享太平"], ex: "吉签。整体健康状况良好，保持规律作息即可。心情愉快就是最好的养生之道。" },
        { n: "健康第三签", lv: "上签", lc: "good", pm: ["晨起运动精神爽", "膳食均衡体自强", "龙王赐福保安康", "身心康泰乐无疆"], ex: "吉签。健康运势不错，适合开始新的运动计划。饮食注意均衡营养，身体会越来越好。" },
        { n: "健康第四签", lv: "中吉", lc: "mid", pm: ["贵人暗中来相助", "逢凶化吉保平安", "虽有小恙不足虑", "调养得当自然安"], ex: "中吉。即使有小毛病也不必担忧，在贵人（好医生）帮助下会很快恢复。注意按时调养。" },
        { n: "健康第五签", lv: "中签", lc: "mid", pm: ["身体发肤需珍重", "劳逸结合保安宁", "小恙无碍休惊慌", "调养得当自然轻"], ex: "中平。注意劳逸结合不要过度劳累。如有小不适不必过于担心，注意休息和调养即可。" },
        { n: "健康第六签", lv: "中平", lc: "mid", pm: ["身体小恙须留意", "莫因忙碌误健康", "适当休息多运动", "养好精神再出发"], ex: "中平。身体在发出信号提醒你注意健康。不要为了工作学业忽视身体，适当放慢脚步。" },
        { n: "健康第七签", lv: "下签", lc: "bad", pm: ["健康亮起黄灯了", "切莫讳疾而忌医", "及时就医遵医嘱", "调养身心最重要"], ex: "注意！身体健康需要重视。不要忽视身体发出的警示信号，及时就医检查，遵从医嘱好好调养。" }

    const CAT_ICONS = { "综合": "🔮", "姻缘": "💕", "事业": "💼", "财运": "💰", "学业": "📚", "健康": "💪" };
    const CAT_NAMES = { "综合": "综合运势", "姻缘": "姻缘桃花", "事业": "事业仕途", "财运": "财运亨通", "学业": "学业功名", "健康": "健康平安" };

    /* ============ 音效 ============ */
    let AC = null, sndOn = true;
    function ac() { if (!AC) AC = new (window.AudioContext || window.webkitAudioContext)(); if (AC.state === 'suspended') AC.resume(); return AC }
    function togSnd() { sndOn = !sndOn; document.getElementById('sndBtn').textContent = sndOn ? '🔊' : '🔇' }
    function sfxKnock() { if (!sndOn) return; const c = ac(), t = c.currentTime; const o = c.createOscillator(), g = c.createGain(); o.type = 'triangle'; o.frequency.setValueAtTime(850, t); o.frequency.exponentialRampToValueAtTime(130, t + .09); g.gain.setValueAtTime(.38, t); g.gain.exponentialRampToValueAtTime(.001, t + .13); o.connect(g); g.connect(c.destination); o.start(t); o.stop(t + .16); const b = c.createBuffer(1, c.sampleRate * .05, c.sampleRate), d = b.getChannelData(0); for (let i = 0; i < d.length; i++)d[i] = (Math.random() * 2 - 1) * Math.exp(-i / (d.length * .12)); const s = c.createBufferSource(), ng = c.createGain(), nf = c.createBiquadFilter(); s.buffer = b; nf.type = 'bandpass'; nf.frequency.value = 3500; nf.Q.value = 1.5; ng.gain.setValueAtTime(.22, t); ng.gain.exponentialRampToValueAtTime(.001, t + .07); s.connect(nf); nf.connect(ng); ng.connect(c.destination); s.start(t) }
    function sfxShake(dur) { if (!sndOn) return; const c = ac(), cnt = Math.floor(dur / .09); for (let i = 0; i < cnt; i++) { const t = c.currentTime + i * .09; const b = c.createBuffer(1, c.sampleRate * .035, c.sampleRate), d = b.getChannelData(0); for (let j = 0; j < d.length; j++)d[j] = (Math.random() * 2 - 1) * .14 * Math.exp(-j / (d.length * .22)); const s = c.createBufferSource(), g = c.createGain(), f = c.createBiquadFilter(); s.buffer = b; f.type = 'highpass'; f.frequency.value = 2800 + Math.random() * 2200; g.gain.setValueAtTime(.08 + Math.random() * .06, t); g.gain.exponentialRampToValueAtTime(.001, t + .045); s.connect(f); f.connect(g); g.connect(c.destination); s.start(t) } }
    function sfxDrop() { if (!sndOn) return; const c = ac(), t = c.currentTime; const o = c.createOscillator(), g = c.createGain(); o.type = 'sine'; o.frequency.setValueAtTime(520, t); o.frequency.exponentialRampToValueAtTime(85, t + .32); g.gain.setValueAtTime(.28, t); g.gain.exponentialRampToValueAtTime(.001, t + .36); o.connect(g); g.connect(c.destination); o.start(t); o.stop(t + .4) }
    function sfxChime() { if (!sndOn) return; const c = ac(), t = c.currentTime;[523, 659, 784, 1047].forEach((f, i) => { const o = c.createOscillator(), g = c.createGain(); o.type = 'sine'; o.frequency.setValueAtTime(f, t + i * .11); g.gain.setValueAtTime(0, t); g.gain.linearRampToValueAtTime(.13, t + i * .11); g.gain.setValueAtTime(.13, t + i * .11); g.gain.exponentialRampToValueAtTime(.001, t + i * .11 + 2.2); o.connect(g); g.connect(c.destination); o.start(t + i * .11); o.stop(t + i * .11 + 2.8) }) }
    function sfxGong() { if (!sndOn) return; const c = ac(), t = c.currentTime; const o = c.createOscillator(), g = c.createGain(); o.type = 'sine'; o.frequency.setValueAtTime(170, t); o.frequency.linearRampToValueAtTime(150, t + .6); g.gain.setValueAtTime(.34, t); g.gain.exponentialRampToValueAtTime(.001, t + 3.2); o.connect(g); g.connect(c.destination); o.start(t); o.stop(t + 3.6); const o2 = c.createOscillator(), g2 = c.createGain(); o2.type = 'sine'; o2.frequency.setValueAtTime(340, t); g2.gain.setValueAtTime(.1, t); g2.gain.exponentialRampToValueAtTime(.001, t + 2); o2.connect(g2); g2.connect(c.destination); o2.start(t); o2.stop(t + 2.5) }

    /* ============ 粒子 ============ */
    function emitPt(cx, cy, n, cs) { const bx = document.getElementById('ptBox'); for (let i = 0; i < n; i++) { const e = document.createElement('div'); e.className = 'pt'; const a = (Math.PI * 2 * i) / n + Math.random() * .5, dist = 45 + Math.random() * 85; const tx = Math.cos(a) * dist, ty = Math.sin(a) * dist, sz = 3 + Math.random() * 5; e.style.cssText = `left:${cx}px;top:${cy}px;width:${sz}px;height:${sz}px;background:${cs[~~(Math.random() * cs.length)]};--tx:${tx}px;--ty:${ty}px`; bx.appendChild(e); requestAnimationFrame(() => e.classList.add('go')); setTimeout(() => e.remove(), 1500) } }
    function emitCf(n) { const bx = document.getElementById('cfBox'); const cs = ['#ffd700', '#ff6b6b', '#74b9ff', '#00b894', '#fdcb6e', '#e17055', '#a29bfe', '#fd79a8']; for (let i = 0; i < n; i++) { const e = document.createElement('div'); e.className = 'cf'; const sz = 4 + Math.random() * 7; e.style.cssText = `left:${Math.random() * 100}%;width:${sz}px;height:${sz * 1.5}px;background:${cs[~~(Math.random() * cs.length)]};animation-delay:${Math.random() * 1.5}s;animation-duration:${2 + Math.random() * 2}s;border-radius:${Math.random() > .5 ? '50%' : '2px'}`; bx.appendChild(e); requestAnimationFrame(() => e.classList.add('go')); setTimeout(() => e.remove(), 5000) } }
    function initGold() { const bx = document.getElementById('goldBox'); for (let i = 0; i < 12; i++) { const e = document.createElement('div'); e.className = 'gp'; const sz = 2 + Math.random() * 3; e.style.cssText = `left:${Math.random() * 100}%;width:${sz}px;height:${sz}px;animation-duration:${7 + Math.random() * 9}s;animation-delay:${Math.random() * 12}s`; bx.appendChild(e) } }

    /* ============ 核心 ============ */
    let busy = false, curCat = '综合', curF = null;
    const SAY = {
      idle: ['点击小龙王手里的签筒求签 🐲', '心诚则灵～想好要问的事 ✨', '嘿嘿，本龙王的签可准了！', '今日海风正好，宜求签问卦～ 🏖️', '来嘛来嘛，点签筒试试～ 🎋', '诚心默念再点签筒哦 🙏'],
      shake: ['摇啊摇～ 签要出来啦！🎋', '嗯嗯…本龙王正在感应…🔮', '哗啦哗啦～ 好签在哪里 ✨', '让本龙王看看你的命数…🐉'],
      result: ['签出来了！快看龙王的启示～', '嘿嘿本龙王觉得这签有意思！', '天机已现好好参悟吧～ 🐲', '龙王赐签诚心领受 ✨']
    };
    const rnd = a => a[~~(Math.random() * a.length)];
    function showBub(t) { const b = document.getElementById('bub'); b.textContent = t; b.classList.add('show') }
    function updCnt() { const b = 2358, h = new Date().getHours(), m = new Date().getMinutes(); document.getElementById('cntN').textContent = (b + h * 41 + m * 5 + ~~(Math.random() * 18)).toLocaleString() }

    function selCat(el, c) {
      curCat = c;
      document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('on'));
      el.classList.add('on');
      showBub(`好～为你求一签${CAT_NAMES[c]} ${CAT_ICONS[c]}`);
    }

    function clickHotspot() {
      if (busy) return; busy = true;
      if (navigator.vibrate) navigator.vibrate([25, 15, 25, 15, 50]);
      ['hsRip', 'hsRip2'].forEach(id => { const r = document.getElementById(id); r.classList.remove('go'); void r.offsetWidth; r.classList.add('go') });
      sfxKnock(); showBub(rnd(SAY.shake));
      document.getElementById('mainBtn').innerHTML = '🔮 龙王占卜中…';
      const shOv = document.getElementById('shakeOv'), stg = document.getElementById('qtStage');
      shOv.classList.add('show');
      setTimeout(() => {
        sfxShake(2.5); stg.classList.add('shaking');
        const r = stg.getBoundingClientRect(), cx = r.left + r.width / 2, cy = r.top + r.height / 2;
        setTimeout(() => emitPt(cx, cy, 10, ['#ffd700', '#d4a017', '#c8860a', '#e8c97a']), 300);
        setTimeout(() => emitPt(cx, cy, 8, ['#ffd700', '#fff', '#ffbe76']), 1200);
      }, 500);
      setTimeout(() => {
        stg.classList.remove('shaking'); sfxDrop();
        if (navigator.vibrate) navigator.vibrate(80);
        const fs = document.getElementById('flyStk'); fs.classList.remove('go'); void fs.offsetWidth; fs.classList.add('go');
        const r2 = stg.getBoundingClientRect(); emitPt(r2.left + r2.width / 2, r2.top + r2.height * .3, 12, ['#ffd700', '#ff6b6b', '#74b9ff']);
      }, 3000);
      setTimeout(() => {
        shOv.classList.remove('show');
        setTimeout(() => { showResult(); busy = false; document.getElementById('mainBtn').innerHTML = '🙏 摇签求卦'; updCnt() }, 400);
      }, 4000);
    }

    /* ★ 核心改动：按当前选中类别抽签 ★ */
    function showResult() {
      const pool = QS[curCat] || QS['综合'];
      curF = pool[~~(Math.random() * pool.length)];
      const f = curF;

      if (f.lv.includes('上上')) { sfxGong(); setTimeout(sfxChime, 400); emitCf(55) } else { sfxChime(); if (f.lc === 'good') emitCf(28) }
      showBub(rnd(SAY.result));
      emitPt(innerWidth / 2, innerHeight / 2, 18, ['#ffd700', '#ff6b6b', '#74b9ff', '#00b894', '#fdcb6e']);

      // 填充弹窗
      document.getElementById('sCat').textContent = `${CAT_ICONS[curCat]} ${CAT_NAMES[curCat]}`;
      document.getElementById('sNo').textContent = f.n;

      document.getElementById('sLv').textContent = f.lv;

      const pm = document.getElementById('sPm');

      document.getElementById('sSeal').textContent = f.lv.includes('上上') ? '龙王赐福' : (f.lc === 'bad' ? '龙王警示' : '龙王赐签');
      const ex = document.getElementById('sEx'); ex.textContent = f.ex; ex.style.animation = 'none'; void ex.offsetWidth; ex.style.animation = '';

      const seal = document.getElementById('sSeal'); seal.style.animation = 'none'; void seal.offsetWidth; seal.style.animation = '';

      document.getElementById('ov').classList.add('show');
      if (navigator.vibrate) navigator.vibrate([18, 8, 18]);

    function closeR() { document.getElementById('ov').classList.remove('show'); setTimeout(() => showBub(rnd(SAY.idle)), 400) }
    function goIndex() { window.location.href = "index.html"; }

    function copyF() {
      if (!curF) return; const f = curF;
      const t = `🐉 小龙王灵签·${f.n}\n类别：${CAT_NAMES[curCat]}\n\n【${f.lv}】\n\n${f.pm.join('\n')}\n\n📜 ${f.ex}\n\n— 小龙王灵签·诚心则灵 —`;
      const done = () => { const b = document.getElementById('cpBtn'); b.textContent = '✅ 已复制到剪贴板'; setTimeout(() => b.textContent = '复制签文分享', 2e3) };
      navigator.clipboard ? navigator.clipboard.writeText(t).then(done) : (() => { const a = document.createElement('textarea'); a.value = t; document.body.appendChild(a); a.select(); document.execCommand('copy'); document.body.removeChild(a); done() })()
    }

    /* ============ 初始化 ============ */
    window.addEventListener('load', () => {
      initGold(); updCnt();
      setTimeout(() => showBub(rnd(SAY.idle)), 800);
      setInterval(() => { if (!busy && !document.getElementById('ov').classList.contains('show')) showBub(rnd(SAY.idle)) }, 6000);
      setInterval(updCnt, 30000);
    });
    document.addEventListener('touchmove', e => { if (!e.target.closest('.slip')) e.preventDefault() }, { passive: false });
    let lt = 0; document.addEventListener('touchend', e => { const n = Date.now(); if (n - lt < 300) e.preventDefault(); lt = n }, false);
    document.addEventListener('keydown', e => { if (e.code === 'Space') { e.preventDefault(); clickHotspot() } });
